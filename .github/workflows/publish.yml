name: Build and Release plugin

on:
  push:
    tags:
      - "v*"  # 버전 태그(v1.2.3) 푸시 시에만 실행

env:
  PLUGIN_NAME: logseq-block-extractor

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: |
          npm run build
          mkdir ${{ env.PLUGIN_NAME }}
          cp README.md package.json icon.png CHANGELOG.md ${{ env.PLUGIN_NAME }}
          mv dist ${{ env.PLUGIN_NAME }}
          zip -r ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip ${{ env.PLUGIN_NAME }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip
          generate_release_notes: true
